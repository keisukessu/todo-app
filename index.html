<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        input {
            width: 70%;
            padding: 8px;
            font-size: 16px;
        }

        button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .done {
            text-decoration: line-through;
            color: #999;
        }

        .delete-btn {
            margin-left: auto;
            color: red;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <h1>📝 Todo App</h1>
    <div>
        <input type="text" id="titleInput" placeholder="やることを入力...">
        <button onclick="createTodo()">追加</button>
    </div>
    <ul id="todoList"></ul>

    <script>
        const API = 'https://2jafcoiaob.execute-api.ap-northeast-1.amazonaws.com/todos';

        async function loadTodos() {
            const res = await fetch(API);
            const todos = await res.json();
            const list = document.getElementById('todoList');
            list.innerHTML = '';
            todos.forEach(todo => {
                const li = document.createElement('li');
                li.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="updateTodo('${todo.id}', this.checked)">
          <span class="${todo.done ? 'done' : ''}">${todo.title}</span>
          <button class="delete-btn" onclick="deleteTodo('${todo.id}')">🗑</button>
        `;
                list.appendChild(li);
            });
        }

        async function createTodo() {
            const title = document.getElementById('titleInput').value;
            if (!title) return;
            await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            });
            document.getElementById('titleInput').value = '';
            loadTodos();
        }

        async function updateTodo(id, done) {
            await fetch(API, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, done })
            });
            loadTodos();
        }

        async function deleteTodo(id) {
            await fetch(API, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            loadTodos();
        }

        loadTodos();
    </script>
</body>

</html>
